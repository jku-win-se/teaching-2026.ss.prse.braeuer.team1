# === Datasource ===
quarkus.datasource.db-kind=postgresql
# Dev-Profil: lokale Entwicklung (Quarkus direkt + Docker nur fuer DB)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/prse
%dev.quarkus.datasource.username=prse
%dev.quarkus.datasource.password=prse
# Prod-Profil: Docker Compose (Backend im Container)
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/prse
%prod.quarkus.datasource.username=prse
%prod.quarkus.datasource.password=prse
# === Hibernate ORM ===
# dev: recreate schema on every restart (test data loaded by StartupDataLoader)
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
# prod: only add missing columns/tables
%prod.quarkus.hibernate-orm.database.generation=update
# Test profile: fresh schema so StartupDataLoader seeds alice/bob on every test run.
# Quarkus Dev Services auto-starts a PostgreSQL container when no datasource URL is set.
%test.quarkus.hibernate-orm.database.generation=drop-and-create
# === IoT Integration ===
# Protocol: mock (default, for development) or mqtt (for real hardware)
iot.protocol=mock
# MQTT broker URL (only used when iot.protocol=mqtt)
iot.mqtt.broker-url=tcp://localhost:1883

# === Logging ===
quarkus.log.level=INFO
quarkus.log.category."at.jku.se".level=DEBUG

# === CORS (Cross-Origin Resource Sharing) ===
# Allow frontend dev server to call backend API during development
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173

# === OpenAPI / Swagger ===
quarkus.swagger-ui.always-include=true
