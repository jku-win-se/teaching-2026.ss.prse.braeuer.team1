name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest

    # Setzt das Arbeitsverzeichnis für alle 'run' Befehle auf den backend-Ordner
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Optimiert die Geschwindigkeit durch Caching

      - name: Compile
        run: mvn compile -q

      - name: Test & coverage check
        run: mvn test

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          # Pfad muss den Unterordner enthalten
          files: backend/target/surefire-reports/*.xml

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: PMD static analysis
        run: mvn pmd:check pmd:cpd-check -q

      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: backend/target/pmd.xml

      - name: Package
        run: mvn package -DskipTests -q
        
      - name: Upload Quarkus App
        uses: actions/upload-artifact@v4
        with:
          name: backend-quarkus-app
          # Quarkus legt die lauffähige App in diesen Unterordner
          path: backend/target/quarkus-app/

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
