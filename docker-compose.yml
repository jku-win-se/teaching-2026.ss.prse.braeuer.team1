services:
  postgres:
    image: postgres:17
    container_name: prse-postgres
    environment:
      POSTGRES_DB: prse
      POSTGRES_USER: prse
      POSTGRES_PASSWORD: prse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U prse -d prse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: prse-backend
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/prse
      QUARKUS_DATASOURCE_USERNAME: prse
      QUARKUS_DATASOURCE_PASSWORD: prse
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: drop-and-create
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: prse-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
